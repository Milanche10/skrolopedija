# Render Blueprint — API servis (free plan).
# Baza: Neon (besplatan Postgres) — DATABASE_URL se unosi ručno u Render dashboard-u.
# AI: Groq free tier (OpenAI-kompatibilan) — OPENAI_API_KEY se unosi ručno.
services:
  - type: web
    name: skrolopedija-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    # Dockerfile je u KORENU repo-a i gradi se iz korenskog konteksta (Render default).
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Boot: migracije → bootstrap admina (bezbedno, kreira samo ako fale) → start.
    # seedAdmins radi samo ako je ADMIN_SEED postavljen; inače se preskače.
    dockerCommand: sh -c "npx prisma migrate deploy || echo migrate-skip; node scripts/seedAdmins.js || echo seed-skip; npm start"
    envVars:
      - key: DATABASE_URL
        sync: false # Neon connection string (direktan, sa ?sslmode=require)
      - key: JWT_SECRET
        generateValue: true # Render generiše nasumičan tajni ključ (ne ide u git)
      - key: ADMIN_SEED
        sync: false # JSON niz admin naloga (plaintext lozinke ostaju samo ovde, ne u git)
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_KEY
        sync: false # console.groq.com → API Keys (besplatno)
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: AUTO_PROCESS_ON_STARTUP
        value: "false"
      - key: PORT
        value: "4000"
